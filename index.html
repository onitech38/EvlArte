<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EvlArte — Gerador Multimédia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Banner offline (oculto por defeito) -->
  <div class="gm__offline-banner" id="gm-offline-banner" style="display:none">
    <span>⚠️</span>
    <span>Sem ligação — a geração está desativada. O histórico continua disponível.</span>
  </div>

  <!-- .gm — wrapper raiz -->
  <div class="gm">

    <!-- Header -->
    <header class="gm__header">
      <div class="gm__brand">
        <div class="gm__brand-icon">EVLA</div>
        <h1 class="gm__brand-name">Evl<span>Arte</span></h1>
      </div>
      <div class="gm__network-status">
        <div class="gm__network-dot" id="gm-net-dot"></div>
        <span class="gm__network-label" id="gm-net-label">Online</span>
      </div>
    </header>

    <!-- Workspace -->
    <div class="gm__workspace">

      <!-- PAINEL ESQUERDO -->
      <aside class="gm__panel">

        <!-- Bloco 1: Tipo -->
        <div class="gm__section">
          <div class="gm__section-header">
            <span class="gm__section-title">Tipo de Conteúdo</span>
          </div>
          <div class="gm__section-body">
            <div class="gm__type-grid">
              <button class="gm__type-card active" data-type="imagem">
                <span class="gm__type-icon">🖼</span>
                <span class="gm__type-label">Imagem</span>
              </button>
              <button class="gm__type-card" data-type="musica">
                <span class="gm__type-icon">🎵</span>
                <span class="gm__type-label">Música</span>
              </button>
              <button class="gm__type-card" data-type="som">
                <span class="gm__type-icon">🔊</span>
                <span class="gm__type-label">Som</span>
              </button>
              <button class="gm__type-card" data-type="video">
                <span class="gm__type-icon">🎬</span>
                <span class="gm__type-label">Vídeo</span>
              </button>
            </div>
          </div>
        </div>

        <!-- Bloco 2: Parâmetros -->
        <div class="gm__section">
          <div class="gm__section-header">
            <span class="gm__section-title">Parâmetros</span>
          </div>
          <div class="gm__section-body">
            <div class="gm__fields">

              <div class="gm__field">
                <label class="gm__field-label" for="param-tema">Tema</label>
                <input class="gm__field-input" type="text" id="param-tema" placeholder="ex: natureza, tecnologia…">
              </div>

              <div class="gm__field">
                <label class="gm__field-label" for="param-estilo">Estilo</label>
                <input class="gm__field-input" type="text" id="param-estilo" placeholder="ex: realista, abstrato…">
              </div>

              <!-- Nº de resultados — só imagem -->
              <div class="gm__field" id="grupo-count">
                <label class="gm__field-label" for="param-count">Nº de Resultados</label>
                <div class="gm__field-row">
                  <input type="number" id="param-count" min="1" max="4" value="1">
                  <span class="gm__field-hint">máx. 4</span>
                </div>
              </div>

              <!-- Duração — só música e som -->
              <div class="gm__field" id="grupo-duracao" style="display:none">
                <label class="gm__field-label" for="param-duracao">Duração (segundos)</label>
                <div class="gm__field-row">
                  <input type="number" id="param-duracao" min="3" max="300" value="15">
                  <span class="gm__field-hint">máx. 300s</span>
                </div>
              </div>

              <!-- Formato — só imagem -->
              <div class="gm__field" id="grupo-formato">
                <label class="gm__field-label" for="param-formato">Formato</label>
                <select class="gm__field-select" id="param-formato">
                  <option>PNG</option>
                  <option>WEBP</option>
                  <option>JPG</option>
                </select>
              </div>

              <!-- Resolução — só imagem -->
              <div class="gm__field" id="grupo-resolucao">
                <label class="gm__field-label" for="param-resolucao">Resolução</label>
                <select class="gm__field-select" id="param-resolucao">
                  <option value="512x512">512 × 512</option>
                  <option value="1024x1024" selected>1024 × 1024</option>
                  <option value="1920x1080">1920 × 1080 (16:9)</option>
                  <option value="1024x1792">1024 × 1792 (Retrato)</option>
                </select>
              </div>

            </div>
          </div>
        </div>

        <!-- Bloco 3: Inspiração -->
        <div class="gm__section">
          <div class="gm__section-header">
            <span class="gm__section-title">Inspiração</span>
            <span class="gm__section-badge">Opcional</span>
          </div>
          <div class="gm__section-body">
            <div class="gm__fields">
              <div class="gm__field">
                <label class="gm__field-label" for="param-artista">Artista / Referência</label>
                <input class="gm__field-input" type="text" id="param-artista" placeholder="ex: Van Gogh, Monet…">
              </div>
            </div>
          </div>
        </div>

        <!-- Bloco 4: Upload de ficheiro -->
        <div class="gm__section">
          <div class="gm__section-header">
            <span class="gm__section-title">Referência</span>
            <span class="gm__section-badge">Opcional</span>
          </div>
          <div class="gm__section-body">
            <div class="gm__fields">
              <div class="gm__field">
                <label class="gm__field-label">Ficheiro (imagem ou .txt)</label>
                <label class="gm__upload-area" for="param-ficheiro">
                  <span class="gm__upload-icon">📎</span>
                  <span class="gm__upload-text">Arrasta ou clica para carregar</span>
                  <input type="file" id="param-ficheiro" accept="image/*,.txt,.md" style="display:none">
                </label>
                <div id="gm-upload-preview"></div>
                <button class="gm__upload-clear-btn" id="gm-upload-clear" style="display:none">✕ remover</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Prompt + Exemplos + Gerar -->
        <div class="gm__prompt-section">
          <div class="gm__prompt-header">
            <span class="gm__prompt-label">Prompt</span>
            <button class="gm__prompt-clear" id="gm-prompt-clear">✕ limpar</button>
          </div>
          <textarea class="gm__prompt-textarea" id="gm-prompt" rows="4"
            placeholder="Descreve o que queres gerar…"></textarea>

          <!-- Exemplos clicáveis -->
          <div class="gm__exemplos">
            <span class="gm__exemplos-label">Exemplos</span>
            <div class="gm__exemplos-lista" id="gm-exemplos-lista"></div>
          </div>

          <button class="gm__generate-btn" id="gm-gerar">⚡ Gerar</button>
        </div>

      </aside>

      <!-- OUTPUT -->
      <section class="gm__output">
        <div class="gm__output-header">
          <span class="gm__output-title">Resultados</span>
          <button class="gm__output-clear" id="gm-output-clear">✕ limpar</button>
        </div>
        <div class="gm__output-body">
          <div class="gm__results-grid" id="gm-results">
            <div class="gm__results-empty">
              <div class="gm__results-empty-icon">✦</div>
              <p>Os resultados aparecerão aqui</p>
            </div>
          </div>
          <div class="gm__history">
            <div class="gm__history-header">
              <span class="gm__history-title">Histórico</span>
              <button class="gm__history-clear-btn" id="gm-history-clear">✕ limpar</button>
            </div>
            <div class="gm__history-list" id="gm-history-list">
              <p class="gm__history-empty">Sem histórico ainda.</p>
            </div>
          </div>
        </div>
      </section>

    </div>
  </div>

  <!-- Logs de debug -->
  <div id="gm-logs" style="
    display: none;
    position: fixed;
    bottom: 36px;
    left: 0;
    width: 100%;
    max-height: 160px;
    overflow-y: auto;
    background: #111118;
    border-top: 1px solid #333;
    padding: 8px 12px;
    font-family: monospace;
    font-size: 11px;
    color: #ccc;
    z-index: 9998;
  "></div>

  <button id="gm-log-toggle" style="
    position: fixed;
    bottom: 0;
    right: 0;
    background: #1a1a24;
    border: 1px solid #333;
    border-radius: 6px 0 0 0;
    padding: 4px 10px;
    font-family: monospace;
    font-size: 10px;
    color: #50506a;
    cursor: pointer;
    z-index: 9999;
  ">🐛 logs</button>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
